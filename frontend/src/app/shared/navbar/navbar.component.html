<header class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="logo">
      <span class="logo-mark">◆</span>
      <span class="logo-text">Orders</span>
    </a>
    <nav class="nav-links">
      @if (isLoggedIn()) {
        @if (isAdmin()) {
          <a routerLink="/admin/orders" routerLinkActive="active" class="nav-link">Orders</a>
          <a routerLink="/admin/analytics" routerLinkActive="active" class="nav-link">Analytics</a>
          <a routerLink="/admin/users" routerLinkActive="active" class="nav-link">Users</a>
        } @else {
          <a routerLink="/orders" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
            All Orders
          </a>
        }
        <button class="btn btn-ghost btn-sm" (click)="logout()">Logout</button>
      }
    </nav>
  </div>
</header>
