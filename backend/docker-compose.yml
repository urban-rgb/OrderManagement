services:
  db:
    image: postgres:16
    container_name: orders_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orders_network

  redis:
    image: redis:latest
    container_name: orders_cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - orders_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orders_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=orders_db;Username=user;Password=password
      - ConnectionStrings__Redis=redis:6379
    networks:
      - orders_network

volumes:
  postgres_data:

networks:
  orders_network:
    external: true